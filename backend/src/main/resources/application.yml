server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: inventario-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventario}
    username: ${DB_USERNAME:inventario_user}
    password: ${DB_PASSWORD:inventario_pass}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
