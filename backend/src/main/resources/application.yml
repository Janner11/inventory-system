server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: inventario-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventario}
    username: ${DB_USERNAME:inventario_user}
    password: ${DB_PASSWORD:inventario_pass}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

keycloak:
  # Issuer publico esperado en el claim "iss" del JWT (ver KC_HOSTNAME en docker-compose.dev.yml)
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/inventario}
  # JWKS URI usado por el backend para obtener las llaves de verificacion (red interna de Docker)
  jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/inventario/protocol/openid-connect/certs}

cors:
  # Origenes permitidos para llamadas desde el navegador (frontend React/Vite). Lista separada por comas.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
